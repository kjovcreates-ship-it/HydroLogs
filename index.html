<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hydration Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Auth Screen ── -->
  <div id="auth-screen">
    <div class="auth-card">

      <!-- Card Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4 C20 4 8 18 8 26 a12 12 0 0 0 24 0 C32 18 20 4 20 4z" fill="rgba(255,255,255,0.95)"/>
            <path d="M20 16 C20 16 14 24 14 28 a6 6 0 0 0 12 0 C26 24 20 16 20 16z" fill="rgba(147,197,253,0.6)"/>
          </svg>
        </div>
        <h1 class="auth-title">Hydration Tracker<sub>by Khimjov</sub></h1>
        <p class="auth-subtitle">Stay hydrated, stay healthy</p>
      </div>

      <!-- Card Body -->
      <div class="auth-body">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="showAuthTab('login')">Login</button>
          <button class="auth-tab" id="tab-signup" onclick="showAuthTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="form-login">
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="login-email" placeholder="Email address" class="auth-input" />
          </div>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="login-password" placeholder="Password" class="auth-input" />
          </div>
          <button class="btn-auth" onclick="loginUser()">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="form-signup" style="display:none;">
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input type="text" id="signup-name" placeholder="Your name" class="auth-input" />
          </div>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="signup-email" placeholder="Email address" class="auth-input" />
          </div>
          <div class="auth-input-wrap">
            <svg class="auth-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="signup-password" placeholder="Password (min 6 characters)" class="auth-input" />
          </div>
          <button class="btn-auth" onclick="signupUser()">Create Account</button>
        </div>

        <div id="auth-error" class="auth-error"></div>
      </div>

    </div>
  </div>

  <!-- ── App Screen ── -->
  <div id="app-screen" style="display:none;">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div>
          <h1>
            <svg width="22" height="22" viewBox="0 0 40 40" fill="none" style="vertical-align:middle; margin-right:6px;" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 4 C20 4 8 18 8 26 a12 12 0 0 0 24 0 C32 18 20 4 20 4z" fill="#3b82f6"/>
              <path d="M20 16 C20 16 14 24 14 28 a6 6 0 0 0 12 0 C26 24 20 16 20 16z" fill="#bfdbfe"/>
            </svg>
            Hydration
          </h1>
          <p id="date-label"></p>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="streak-badge" id="streak-badge">
            <div class="fire">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#f97316" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2c0 0-5 4.5-5 9a5 5 0 0 0 10 0c0-2-1-4-2-5 0 2-1.5 3-2 3.5C13 7.5 12 2 12 2z"/>
              </svg>
            </div>
            <span id="streak-text"></span>
          </div>
          <div class="user-menu">
            <span id="user-name-label"></span>
            <button class="btn-logout" onclick="logoutUser()">Logout</button>
          </div>
        </div>
      </div>

      <!-- Wave progress card -->
      <div class="wave-card">
        <svg id="wave-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs>
            <clipPath id="bottle"><rect x="0" y="0" width="100" height="100" rx="20"/></clipPath>
          </defs>
          <g clip-path="url(#bottle)">
            <rect id="wave-bg" x="0" y="0" width="100" height="100" fill="#bfdbfe"/>
            <path id="wave-back" fill="#3b82f6" opacity="0.25"/>
            <path id="wave-front" fill="#3b82f6" opacity="0.9"/>
          </g>
        </svg>
        <div class="wave-content">
          <div class="total-display" id="total-display">0<span>ml</span></div>
          <div class="goal-msg" id="goal-msg"></div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="progress-footer">
            <span id="pct-label">0%</span>
            <button class="goal-edit-btn" id="goal-edit-btn">Goal: 2000 ml</button>
          </div>
        </div>
      </div>

      <!-- Goal editor -->
      <div class="goal-editor card" id="goal-editor">
        <div class="card-label">Set daily goal</div>
        <div class="row">
          <input type="number" id="goal-input" placeholder="e.g. 2500" min="100" max="10000" />
          <button class="btn-save" onclick="saveGoal()">Save</button>
          <button class="btn-cancel" onclick="closeGoalEditor()">✕</button>
        </div>
      </div>

      <!-- Quick add -->
      <div class="card">
        <div class="card-label">Quick add</div>
        <div class="presets-grid" id="presets-grid"></div>
      </div>

      <!-- Custom amount -->
      <div class="card">
        <div class="card-label">Custom amount</div>
        <div class="row">
          <input type="number" id="custom-input" placeholder="Enter ml amount" min="1" max="5000" />
          <button class="btn-primary" onclick="handleCustomAdd()">+ Add</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="card tabs-card">
        <div class="tabs">
          <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">Today's Log</button>
          <button class="tab-btn" id="tab-history" onclick="switchTab('history')">Check Drinking History</button>
        </div>
      </div>

      <!-- Today's log -->
      <div class="card" id="panel-today">
        <div class="card-label" id="log-count-label">Today's entries (0)</div>
        <div id="log-list"></div>
      </div>

      <!-- History -->
      <div class="card" id="panel-history" style="display:none;">
        <div class="card-label">History</div>

        <!-- Calendar Range Picker -->
        <div class="calendar-wrap">
          <!-- Month navigation -->
          <div class="cal-header">
            <button class="cal-nav" id="cal-prev" onclick="calPrevMonth()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span class="cal-month-label" id="cal-month-label"></span>
            <button class="cal-nav" id="cal-next" onclick="calNextMonth()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>

          <!-- Day labels -->
          <div class="cal-grid">
            <div class="cal-day-label">Su</div>
            <div class="cal-day-label">Mo</div>
            <div class="cal-day-label">Tu</div>
            <div class="cal-day-label">We</div>
            <div class="cal-day-label">Th</div>
            <div class="cal-day-label">Fr</div>
            <div class="cal-day-label">Sa</div>
            <div id="cal-days"></div>
          </div>

          <!-- Selected range info & button -->
          <div class="cal-footer">
            <span class="cal-range-label" id="cal-range-label">Select a start date</span>
            <button class="btn-view-range" id="btn-view-range" onclick="viewRange()" style="display:none;">View Range</button>
          </div>
        </div>

        <!-- History results -->
        <div class="history-list" id="history-list"></div>
      </div>

    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
